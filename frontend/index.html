<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Classification AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1>Iris AI Classifier</h1>
            <p>Predict the species of an Iris flower based on its physical measurements using a state-of-the-art Logistic Regression model.</p>
        </header>

        <div class="card">
            <form id="prediction-form">
                <div class="input-grid">
                    <div class="input-group">
                        <label for="sepal_length">Sepal Length (cm)</label>
                        <input type="number" id="sepal_length" step="0.1" min="0" required placeholder="e.g. 5.1">
                    </div>
                    <div class="input-group">
                        <label for="sepal_width">Sepal Width (cm)</label>
                        <input type="number" id="sepal_width" step="0.1" min="0" required placeholder="e.g. 3.5">
                    </div>
                    <div class="input-group">
                        <label for="petal_length">Petal Length (cm)</label>
                        <input type="number" id="petal_length" step="0.1" min="0" required placeholder="e.g. 1.4">
                    </div>
                    <div class="input-group">
                        <label for="petal_width">Petal Width (cm)</label>
                        <input type="number" id="petal_width" step="0.1" min="0" required placeholder="e.g. 0.2">
                    </div>
                </div>
                <button type="submit" id="submit-btn">
                    <span id="btn-text">Predict Species</span>
                    <div class="spinner hidden" id="spinner"></div>
                </button>
            </form>

            <div id="result-container" class="result-container hidden">
                <h3 id="prediction-result">Iris-setosa</h3>
                <div class="confidence-bar-container">
                    <div class="confidence-bar" id="confidence-bar"></div>
                </div>
                <p id="confidence-text">98.5% Confidence</p>
            </div>
            
            <div id="error-container" class="error-container hidden">
                <p id="error-message">Error connecting to the API.</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
